<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Data – Hyundai Tín Thanh</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Be Vietnam Pro',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:100%;max-width:480px;overflow:hidden;}
  .card-header{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);padding:28px 32px;color:#fff;}
  .card-header h1{font-size:20px;font-weight:700;margin-bottom:4px;}
  .card-header p{font-size:13px;opacity:.75;}
  .card-body{padding:32px;}

  .drop-zone{border:2px dashed #cbd5e1;border-radius:12px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#f8fafc;position:relative;}
  .drop-zone:hover,.drop-zone.dragover{border-color:#2563eb;background:#eff6ff;}
  .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .drop-icon{font-size:40px;margin-bottom:12px;}
  .drop-title{font-size:15px;font-weight:600;color:#1e293b;margin-bottom:4px;}
  .drop-sub{font-size:12px;color:#94a3b8;}

  .file-info{display:none;margin-top:16px;padding:12px 16px;background:#f1f5f9;border-radius:8px;font-size:13px;color:#334155;display:flex;align-items:center;gap:10px;}
  .file-info .fname{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .file-info .fsize{color:#94a3b8;flex-shrink:0;}

  .btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px;font-family:inherit;transition:all .2s;}
  .btn-upload{background:#2563eb;color:#fff;}
  .btn-upload:hover{background:#1d4ed8;}
  .btn-upload:disabled{background:#93c5fd;cursor:not-allowed;}

  .progress-wrap{margin-top:16px;display:none;}
  .progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:#2563eb;border-radius:3px;width:0;transition:width .3s;}
  .progress-label{font-size:12px;color:#64748b;margin-top:6px;text-align:center;}

  .result{margin-top:16px;padding:14px 16px;border-radius:10px;font-size:13px;font-weight:500;display:none;}
  .result.success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;}
  .result.error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;}

  .divider{border:none;border-top:1px solid #f1f5f9;margin:24px 0;}
  .link-app{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f8fafc;border-radius:10px;text-decoration:none;color:#1e293b;font-size:13px;font-weight:500;border:1px solid #e2e8f0;transition:background .2s;}
  .link-app:hover{background:#eff6ff;}
  .link-app span{color:#2563eb;}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>📊 Cập nhật dữ liệu</h1>
    <p>Hyundai Tín Thanh – Báo cáo hàng hóa & bán hàng</p>
  </div>
  <div class="card-body">

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <div class="drop-icon">📁</div>
      <div class="drop-title">Kéo thả file Excel vào đây</div>
      <div class="drop-sub">hoặc click để chọn file · Hỗ trợ .xlsx, .xls</div>
    </div>

    <div class="file-info" id="fileInfo" style="display:none">
      <span>📄</span>
      <span class="fname" id="fileName"></span>
      <span class="fsize" id="fileSize"></span>
    </div>

    <button class="btn btn-upload" id="btnUpload" disabled onclick="uploadFile()">
      ⬆ Tải lên GitHub
    </button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">Đang tải lên...</div>
    </div>

    <div class="result" id="result"></div>

    <hr class="divider">
    <a href="index.html" class="link-app">
      <span>🔗 Mở báo cáo</span>
      <span>→</span>
    </a>

  </div>
</div>

<script>
const GITHUB_TOKEN = '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';
const GITHUB_USER  = 'tinthanhgroup';
const GITHUB_REPO  = 'bao-cao-Hyundai';
const GITHUB_BRANCH= 'main';
const FILE_PATH    = 'data.xlsx';

var selectedFile = null;

// Drag & drop
var dz = document.getElementById('dropZone');
dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', function(){ dz.classList.remove('dragover'); });
dz.addEventListener('drop', function(e){
  e.preventDefault(); dz.classList.remove('dragover');
  var f = e.dataTransfer.files[0];
  if(f) setFile(f);
});
document.getElementById('fileInput').addEventListener('change', function(){
  if(this.files[0]) setFile(this.files[0]);
});

function setFile(f){
  selectedFile = f;
  document.getElementById('fileName').textContent = f.name;
  document.getElementById('fileSize').textContent = (f.size/1024).toFixed(0) + ' KB';
  document.getElementById('fileInfo').style.display = 'flex';
  document.getElementById('btnUpload').disabled = false;
  document.getElementById('result').style.display = 'none';
}

function setProgress(pct, label){
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

function showResult(ok, msg){
  var el = document.getElementById('result');
  el.style.display = 'block';
  el.className = 'result ' + (ok ? 'success' : 'error');
  el.textContent = msg;
}

async function uploadFile(){
  if(!selectedFile) return;
  var btn = document.getElementById('btnUpload');
  btn.disabled = true;
  btn.textContent = '⏳ Đang xử lý...';
  document.getElementById('result').style.display = 'none';

  try {
    // 1. Đọc file thành base64
    setProgress(20, 'Đang đọc file...');
    var base64 = await toBase64(selectedFile);

    // 2. Lấy SHA của file cũ (nếu có) để overwrite
    setProgress(40, 'Kiểm tra file hiện tại...');
    var sha = null;
    try {
      var getRes = await fetch(
        'https://api.github.com/repos/'+GITHUB_USER+'/'+GITHUB_REPO+'/contents/'+FILE_PATH+'?ref='+GITHUB_BRANCH,
        { headers: { 'Authorization': 'token '+GITHUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' } }
      );
      if(getRes.ok){
        var info = await getRes.json();
        sha = info.sha;
      }
    } catch(e){}

    // 3. Upload lên GitHub
    setProgress(70, 'Đang tải lên GitHub...');
    var now = new Date();
    var pad = n => String(n).padStart(2,'0');
    var msg = 'Cập nhật data '+pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());

    var body = { message: msg, content: base64, branch: GITHUB_BRANCH };
    if(sha) body.sha = sha;

    var putRes = await fetch(
      'https://api.github.com/repos/'+GITHUB_USER+'/'+GITHUB_REPO+'/contents/'+FILE_PATH,
      {
        method: 'PUT',
        headers: { 'Authorization': 'token '+GITHUB_TOKEN, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify(body)
      }
    );

    setProgress(100, 'Hoàn thành!');

    if(putRes.ok){
      showResult(true, '✅ Tải lên thành công! Vào báo cáo và bấm "🔄 Cập nhật data" để xem dữ liệu mới.');
    } else {
      var err = await putRes.json();
      showResult(false, '❌ Lỗi: ' + (err.message || putRes.status));
    }

  } catch(e){
    showResult(false, '❌ Lỗi kết nối: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = '⬆ Tải lên GitHub';
  setTimeout(()=>{ document.getElementById('progressWrap').style.display='none'; }, 2000);
}

function toBase64(file){
  return new Promise(function(resolve, reject){
    var r = new FileReader();
    r.onload = function(){ resolve(r.result.split(',')[1]); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
