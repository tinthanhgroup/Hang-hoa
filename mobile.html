<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hàng hóa – Hyundai Tín Thanh</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

:root {
  --bg:#f0f4fa; --surface:#fff; --border:#dce3f0;
  --text:#1a2240; --muted:#6b7a9e; --accent:#2563eb;
  --blue:#1a4fa0; --blue-mid:#3b6fd4;
  --c-stock:#1a6fc4; --c-bo:#3ab0e8; --c-lxx:#ef9f27; --c-debt:#e24b4a;
  --shadow:0 2px 10px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}

/* LOADING */
#loading{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a5f,#2563eb);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;transition:opacity .4s;}
#loading.hidden{opacity:0;pointer-events:none;}
.load-logo{font-size:20px;font-weight:800;color:#fff;}
.load-logo span{color:#fbbf24;}
.load-bar{width:180px;height:3px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden;}
.load-fill{height:100%;background:#fbbf24;border-radius:3px;width:0;transition:width .3s;}
.load-txt{font-size:11px;color:rgba(255,255,255,.6);}

/* HEADER */
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(37,99,235,.3);}
.hdr-brand{font-size:14px;font-weight:800;color:#fff;}
.hdr-brand span{color:#fbbf24;}
.hdr-time{font-size:9px;color:rgba(255,255,255,.6);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.btn-refresh{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;}
.btn-refresh:active{background:rgba(255,255,255,.28);}
.btn-refresh.loading{opacity:.6;pointer-events:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;animation:spin .7s linear infinite;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px 8px 5px;}
.kpi{background:var(--surface);border-radius:9px;padding:7px 6px;text-align:center;box-shadow:var(--shadow);border-top:3px solid var(--c);cursor:pointer;transition:transform .12s;}
.kpi:active{transform:scale(.95);}
.kpi.active{box-shadow:0 0 0 2px var(--c),var(--shadow);}
.kpi-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:2px;}
.kpi-val{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--c);line-height:1;}

/* FILTER BAR — grid 7 nút vừa màn hình */
.filter-bar{padding:0 8px 6px;display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.fbtn{height:26px;padding:0 2px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;text-align:center;}
.fbtn.active{border-color:var(--accent);background:#eff6ff;color:var(--accent);font-weight:700;}

/* LEGEND */
.legend{padding:0 8px 5px;display:flex;gap:10px;align-items:center;font-size:10px;color:var(--muted);}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px;}

/* PANELS */
.panels{padding:0 8px 16px;display:flex;flex-direction:column;gap:10px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-top:10px;}
.panel-hdr{padding:7px 10px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-hdr-count{color:var(--accent);font-size:11px;font-weight:800;text-transform:none;letter-spacing:0;}

/* LEV1 COL HEADER */
.lev1-col-hdr{display:flex;align-items:center;padding:4px 10px 4px 10px;background:#f4f6fb;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.ch-name{flex:1;min-width:0;}
.ch-yr25{width:32px;text-align:right;color:#c0392b;flex-shrink:0;}
.ch-col{width:36px;text-align:right;flex-shrink:0;}
.ch-debt{width:36px;text-align:right;color:var(--c-debt);flex-shrink:0;}

/* DRILL ROWS */
.drill-row{display:flex;align-items:center;padding:8px 10px;gap:0;border-bottom:1px solid #f3f4f8;cursor:pointer;border-left:3px solid transparent;transition:background .12s;}
.drill-row:last-child{border-bottom:none;}
.drill-row:active{background:#f0f4ff;}
.drill-row.active{background:#e8f0fc;border-left-color:var(--blue);}
.dr-name{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.dr-yr25{font-size:11px;font-weight:700;color:#c0392b;width:32px;text-align:right;flex-shrink:0;}
.dr-bars{display:flex;height:14px;gap:1px;flex:1;}
.dr-seg{height:100%;border-radius:2px;min-width:1px;}
.dr-tot{font-size:13px;font-weight:700;width:36px;text-align:right;flex-shrink:0;}
.dr-debt{font-size:13px;font-weight:700;color:var(--c-debt);width:36px;text-align:right;flex-shrink:0;}
.bonus{display:inline-block;font-size:8px;font-weight:700;padding:1px 4px;border-radius:6px;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;margin-left:4px;vertical-align:middle;}

/* LEV2 ROWS */
.lev2-col-hdr{display:flex;align-items:center;padding:4px 10px;background:#f4f6fb;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.lev2-col-hdr .l2-name{flex:1;min-width:0;}
.l2-cnt{width:36px;text-align:right;flex-shrink:0;font-size:9px;}
.lev2-row{display:flex;align-items:center;padding:8px 10px;gap:0;border-bottom:1px solid #f3f4f8;cursor:pointer;border-left:3px solid transparent;transition:background .12s;}
.lev2-row:last-child{border-bottom:none;}
.lev2-row:active{background:#f0f4ff;}
.lev2-row.active{background:#e8f0fc;border-left-color:var(--blue-mid);}
.lev2-name{flex:1;font-size:12px;font-weight:500;min-width:0;}
.yr-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 4px;border-radius:6px;white-space:nowrap;margin-left:3px;}
.yr25{background:#fff3e0;color:#e65100;} .yr26{background:#e3f2fd;color:#0d47a1;} .yr24{background:#f3e5f5;color:#6a1b9a;}
.vc{font-size:12px;font-weight:700;width:36px;text-align:right;flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.vc-s{color:#1e40af;} .vc-b{color:#0369a1;} .vc-l{color:#92400e;} .vc-d{color:#991b1b;}
.vc-empty{color:#d1d5db;}

/* LEV3 TABLE */
.lev3-inner{padding:8px;overflow-x:auto;}
.lev3-table{width:100%;border-collapse:collapse;font-size:11px;}
.lev3-table thead th{padding:6px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid var(--border);text-align:center;background:#f8fafc;white-space:nowrap;}
.lev3-table thead th:first-child{text-align:left;}
.lev3-table thead th:not(:first-child){border-left:1px solid var(--border);}
.lev3-table tbody tr{border-bottom:1px solid #f3f4f8;}
.lev3-table tbody tr:last-child{border:none;}
.lev3-table tbody td{padding:8px 4px;vertical-align:middle;text-align:center;}
.lev3-table tbody td:first-child{text-align:left;}
.lev3-table tbody td:not(:first-child){border-left:1px solid #f3f4f8;}
.cdot{display:inline-block;width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.12);vertical-align:middle;margin-right:4px;}
.cc{display:inline-block;font-size:9px;font-weight:700;padding:1px 4px;border-radius:5px;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.cc-s{background:#dbeafe;color:#1e40af;} .cc-b{background:#e0f2fe;color:#0369a1;} .cc-l{background:#fef3c7;color:#92400e;} .cc-d{background:#fee2e2;color:#991b1b;}
.kho-chips{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;justify-content:center;}
.kchip{font-size:9px;font-weight:600;padding:1px 4px;border-radius:4px;white-space:nowrap;}
.kchip-s{background:#dbeafe;color:#1e40af;} .kchip-b{background:#e0f2fe;color:#0369a1;} .kchip-l{background:#fef3c7;color:#92400e;} .kchip-d{background:#fee2e2;color:#991b1b;}
.l3-cell{display:flex;flex-direction:column;align-items:center;gap:0;}
.l3-total{display:inline-block;font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1.2;}
.l3-total-s{color:#1a6fc4;}
.l3-total-b{color:#3ab0e8;}
.l3-total-l{color:#ef9f27;}
.l3-total-d{color:#e24b4a;}
.l3-empty{color:#d1d5db;font-size:11px;padding:2px 4px;}

/* TOTAL ROW */
.total-row{display:flex;align-items:center;padding:7px 10px;gap:0;border-top:2px solid var(--border);background:#f7f8fc;}
.total-row .dr-name{font-size:11px;font-weight:700;color:#555;flex:1;min-width:0;}

/* LIST TABLE (BO / LXX / Xe nợ) */
.list-wrap{overflow-x:auto;padding:0;}
.list-table{width:100%;border-collapse:collapse;font-size:12px;}
.list-table thead th{padding:7px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#fff;background:var(--blue);white-space:nowrap;text-align:left;position:sticky;top:0;}
.list-table thead th.r{text-align:right;}
.list-table tbody tr{border-bottom:1px solid #f3f4f8;}
.list-table tbody tr:last-child{border:none;}
.list-table tbody tr:hover{background:#f8f9ff;}
.list-table tbody td{padding:7px 8px;vertical-align:middle;}
.list-table tbody td.r{text-align:right;}
.td-model{font-weight:700;color:var(--blue);white-space:nowrap;}
.td-num{font-size:11px;color:#aaa;width:24px;}
.yr-sm{display:inline-block;font-size:9px;font-weight:700;padding:1px 4px;border-radius:5px;white-space:nowrap;}
.days-num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;}
.days-ok{color:var(--text);}
.days-warn{color:#b8860b;}
.days-hot{color:#c0392b;}

.empty-panel{padding:20px;text-align:center;color:var(--muted);font-size:11px;}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1a2240;color:#fff;padding:9px 16px;border-radius:9px;font-size:11px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <img src="https://raw.githubusercontent.com/tinthanhgroup/Hang-hoa/main/logo.jpg" style="width:90px;height:90px;border-radius:20px;object-fit:cover;box-shadow:0 4px 20px rgba(0,0,0,.3);">
  <div class="load-logo">Hyundai <span>Tín Thanh</span></div>
  <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
  <div class="load-txt" id="load-txt">Đang tải dữ liệu...</div>
</div>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="hdr-brand">Hyundai <span>Tín Thanh</span></div>
    <div class="hdr-time" id="hdr-time">—</div>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
    <span id="ri">↺</span> Cập nhật
  </button>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi" style="--c:var(--c-stock)" id="kpi-stock" onclick="setType('stock')">
      <div class="kpi-lbl">Tồn kho</div>
      <div class="kpi-val" id="kv-stock">0</div>
    </div>
    <div class="kpi" style="--c:var(--c-bo)" id="kpi-bo" onclick="setType('bo')">
      <div class="kpi-lbl">BO</div>
      <div class="kpi-val" id="kv-bo">0</div>
    </div>
    <div class="kpi" style="--c:var(--c-lxx)" id="kpi-lxx" onclick="setType('lxx')">
      <div class="kpi-lbl">Có LXX</div>
      <div class="kpi-val" id="kv-lxx">0</div>
    </div>
    <div class="kpi" style="--c:var(--c-debt)" id="kpi-debt" onclick="setType('debt')">
      <div class="kpi-lbl">Xe nợ</div>
      <div class="kpi-val" id="kv-debt">0</div>
    </div>
  </div>

  <!-- FILTER — 7 nút trọn màn hình -->
  <div class="filter-bar">
    <button class="fbtn active" id="fbtn-" onclick="setKho('')">Tất cả</button>
    <button class="fbtn" id="fbtn-NT" onclick="setKho('NT')">NT</button>
    <button class="fbtn" id="fbtn-ĐL" onclick="setKho('ĐL')">Đà Lạt</button>
    <button class="fbtn" id="fbtn-PY" onclick="setKho('PY')">Phú Yên</button>
    <button class="fbtn" id="fbtn-PR" onclick="setKho('PR')">P.Rang</button>
    <button class="fbtn" id="fbtn-BL" onclick="setKho('BL')">B.Lộc</button>
    <button class="fbtn" id="fbtn-ĐN" onclick="setKho('ĐN')">Đak Nông</button>
  </div>

  <!-- CONTENT -->
  <div id="main-content"></div>

</div>

<div class="toast" id="toast"></div>

<script>
var GSHEET_URL = 'https://raw.githubusercontent.com/tinthanhgroup/Hang-hoa/main/data.xlsx';
var MODEL_ORDER = ['Grand i10','Venue','Accent','Elantra','Creta','Tucson','Stargazer','Custin','Santafe','Ioniq','Palisade','Staria'];
var BRANCHES = ['NT','ĐL','PY','PR','BL','ĐN'];
var KHO_LABEL = {NT:'Nha Trang','ĐL':'Đà Lạt',PY:'Phú Yên',PR:'Phan Rang',BL:'Bảo Lộc','ĐN':'Đak Nông'};
var BONUS_MAP = {'Grand i10':1,'Creta':1,'Tucson':1,'Staria':1,'Stargazer':1.25,'Custin':1.25,'Venue':1.25,'Accent':1.25,'Santafe':1.5,'Palisade':1.5,'Elantra':1.5,'Ioniq':1.5};

var allData = {stock:[],bo:[],lxx:[],debt:[]};
var khoFilter = '', typeFilter = null;
var selModel = null, selVersion = null;
var fileDate = null;

// ─── HELPERS ───
function na2(s){return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[đĐ]/g,'d').toLowerCase().replace(/\s+/g,'');}
function normModel(m){
  if(!m) return 'Khác';
  var ml=m.toString().toLowerCase();
  if(ml.includes('i10')) return 'Grand i10';
  if(ml.includes('venue')) return 'Venue';
  if(ml.includes('accent')) return 'Accent';
  if(ml.includes('elantra')) return 'Elantra';
  if(ml.includes('creta')) return 'Creta';
  if(ml.includes('tucson')) return 'Tucson';
  if(ml.includes('stargazer')) return 'Stargazer';
  if(ml.includes('custin')) return 'Custin';
  if(ml.includes('santa')) return 'Santafe';
  if(ml.includes('ioniq')) return 'Ioniq';
  if(ml.includes('palisade')) return 'Palisade';
  if(ml.includes('staria')) return 'Staria';
  return m.toString().trim();
}
function normMau(mau){
  if(!mau) return '—';
  var s=mau.toString().trim(), sl=s.indexOf('/');
  if(sl>=0) s=s.substring(0,sl).trim();
  return s||'—';
}
function colorDot(mau){
  if(!mau) return '#ccc';
  var m=mau.toLowerCase();
  if(m.includes('trắng')) return '#f0efe8';
  if(m.includes('đen')) return '#222';
  if(m.includes('đỏ')) return '#c0392b';
  if(m.includes('bạc')) return '#b0b0b0';
  if(m.includes('xanh')) return '#2980b9';
  if(m.includes('xám')) return '#888';
  if(m.includes('nâu')||m.includes('cam')) return '#c0792b';
  if(m.includes('vàng')) return '#e0b020';
  return '#aaa';
}
function normKho(k){
  if(!k) return '';
  var m={'DL':'ĐL','DN':'ĐN'};
  return m[k]||k;
}
function khoFromTVBH(t){if(!t)return '';var s=t.toString().trim(),d=s.lastIndexOf('.');return d>=0?normKho(s.substring(d+1).toUpperCase()):'';}
function khoLabel(k){return KHO_LABEL[k]||k||'—';}
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},3000);}
function setProgress(pct,txt){document.getElementById('load-fill').style.width=pct+'%';document.getElementById('load-txt').textContent=txt;}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function fmtDate(v){
  if(!v) return '—';
  var d;
  if(typeof v==='number') d=new Date((v-25569)*86400000);
  else if(v instanceof Date) d=v;
  else d=new Date(v);
  if(isNaN(d)) return '—';
  return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();
}
function daysSince(v){
  if(!v) return null;
  var d;
  if(typeof v==='number') d=new Date((v-25569)*86400000);
  else if(v instanceof Date) d=v;
  else{d=new Date(v);if(isNaN(d))return null;}
  return Math.floor((Date.now()-d.getTime())/86400000);
}

// ─── LOAD ───
function loadData(){
  var btn=document.getElementById('btn-refresh');
  var ri=document.getElementById('ri');
  btn.classList.add('loading'); ri.className='spin'; ri.textContent='↺';
  setProgress(10,'Đang kết nối...');
  document.getElementById('loading').classList.remove('hidden');

  fetch(GSHEET_URL+'?t='+Date.now(),{redirect:'follow'})
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      var lm=r.headers.get('Last-Modified');
      if(lm) fileDate=new Date(lm);
      setProgress(50,'Đang đọc file...');
      return r.arrayBuffer();
    })
    .then(function(buf){
      if(buf.byteLength<1000) throw new Error('File lỗi');
      setProgress(75,'Đang xử lý...');
      var wb=XLSX.read(new Uint8Array(buf),{type:'array',cellDates:true,raw:true});
      var sn=wb.SheetNames.find(function(s){var n=na2(s);return n.includes('baocao')||n.includes('bh');})||wb.SheetNames[0];
      var ws=wb.Sheets[sn];
      var rawRows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
      parseRows(rawRows);
      setProgress(100,'Hoàn tất!');
      // Ưu tiên: workbook properties (thời điểm lưu Excel) → Last-Modified header → hiện tại
      try {
        var props=wb.Props||wb.Custprops;
        if(props&&props.ModifiedDate) fileDate=new Date(props.ModifiedDate);
        else if(props&&props.LastModified) fileDate=new Date(props.LastModified);
      } catch(e){}
      if(!fileDate) fileDate=new Date();
      var t=fileDate;
      document.getElementById('hdr-time').textContent='Cập nhật: '+pad(t.getDate())+'/'+pad(t.getMonth()+1)+'/'+t.getFullYear()+' '+pad(t.getHours())+':'+pad(t.getMinutes());
      setTimeout(function(){
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').style.display='block';
        selModel=null; selVersion=null;
        renderAll();
      },400);
    })
    .catch(function(e){
      document.getElementById('loading').classList.add('hidden');
      showToast('❌ Lỗi: '+e.message);
    })
    .finally(function(){btn.classList.remove('loading');ri.className='';ri.textContent='↺';});
}

// ─── PARSE ───
function parseRows(rawRows){
  var headers=rawRows[0]||[];
  var hMap={};
  headers.forEach(function(h,i){if(h!=null) hMap[h.toString().replace(/\s+/g,'')]=i;});
  function gc(row,name){var idx=hMap[name.replace(/\s+/g,'')];return idx!==undefined?row[idx]:null;}

  allData={stock:[],bo:[],lxx:[],debt:[]};

  rawRows.slice(1).forEach(function(row){
    if(!row||!row.length) return;
    var tt=gc(row,'Trạngthái'); if(!tt) return;
    tt=tt.toString().trim();

    var model=normModel((gc(row,'Model')||'').toString());
    var phienBan=((gc(row,'Phiênbản')||'').toString().trim())||'—';
    var mau=normMau((gc(row,'Màu')||'').toString().trim());
    var namSXRaw=gc(row,'NĂMSX');
    var namSX=namSXRaw!=null&&namSXRaw!==''?String(Math.round(parseFloat(namSXRaw))||'').replace('NaN',''):'';
    if(!namSX||namSX==='0') namSX='';
    var kho=normKho((gc(row,'KHOXE')||'').toString().trim());
    var soKhung=((gc(row,'Sốkhung')||'').toString().trim());
    if(soKhung==='null'||soKhung==='NaN') soKhung='';
    var ngayPhan=gc(row,'NGÀYPHÂNXE');
    var ngayCoc=gc(row,'NGÀYĐẶTCỌC');
    var tvbh=((gc(row,'TVBH')||'').toString().trim());
    var daly=((gc(row,'Đạilýđặthàng')||'').toString().trim());

    // KH đặt cọc
    var khachKey=Object.keys(hMap).find(function(k){
      var n=na2(k);
      return n.startsWith('khachhang')||n.startsWith('khdatcoc')||n.startsWith('khdat');
    });
    var khach=khachKey?((row[hMap[khachKey]]||'').toString().trim()):'';

    var base={model:model,phienBan:phienBan,mau:mau,namSX:namSX,kho:kho,soKhung:soKhung,tvbh:tvbh,khach:khach,ngayCoc:ngayCoc};

    if(tt==='Xe đã về kho'&&!ngayPhan){
      allData.stock.push(Object.assign({type:'stock'},base));
    } else if(tt==='DS nợ'){
      allData.debt.push(Object.assign({type:'debt'},base,{kho:khoFromTVBH(tvbh)||kho}));
    } else if(tt==='BO'){
      allData.bo.push(Object.assign({type:'bo'},base,{kho:daly||kho,namSX:namSX||'2026'}));
    } else if(tt==='LXX'){
      allData.lxx.push(Object.assign({type:'lxx'},base,{kho:daly||kho}));
    }
  });
}

// ─── FILTERS ───
function setKho(k){
  khoFilter=k;
  selModel=null; selVersion=null;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  var el=document.getElementById('fbtn-'+k);
  if(el) el.classList.add('active');
  renderAll();
}

function setType(t){
  if(typeFilter===t){
    // Tap lại → về tất cả trạng thái
    typeFilter=null;
  } else {
    typeFilter=t;
  }
  selModel=null; selVersion=null;
  updateKpiActive();
  renderAll();
}

function updateKpiActive(){
  ['stock','bo','lxx','debt'].forEach(function(x){
    document.getElementById('kpi-'+x).classList.toggle('active',typeFilter===x);
  });
}

function matchFilter(r){
  if(khoFilter&&r.kho!==khoFilter) return false;
  return true;
}

// ─── RENDER ALL ───
function renderAll(){
  function cnt(arr){return arr.filter(matchFilter).length;}
  document.getElementById('kv-stock').textContent=cnt(allData.stock);
  document.getElementById('kv-bo').textContent=cnt(allData.bo);
  document.getElementById('kv-lxx').textContent=cnt(allData.lxx);
  document.getElementById('kv-debt').textContent=cnt(allData.debt);

  var mc=document.getElementById('main-content');

  if(typeFilter==='bo'){
    mc.innerHTML=renderListBO();
  } else if(typeFilter==='lxx'){
    mc.innerHTML=renderListLXX();
  } else if(typeFilter==='debt'){
    mc.innerHTML=renderListDebt();
  } else {
    // null = tất cả, 'stock' = chỉ tồn kho — đều dùng drill-down
    mc.innerHTML=renderDrillHTML();
  }
}

// ─── YR BADGE ───
function yrBadgeHTML(namSX){
  if(!namSX) return '';
  var y=parseInt(namSX);
  var cls=y===2025?'yr25':y===2024?'yr24':y===2026?'yr26':'';

// ─── DRILL-DOWN HTML ───
function renderDrillHTML(){
  var models=buildHierarchy();
  var mx=1;
  models.forEach(function(m){var t=m.stock+m.bo+m.lxx;if(t>mx)mx=t;});

  var yr25Map={};
  allData.stock.concat(allData.bo).forEach(function(r){
    if(parseInt(r.namSX)===2025&&matchFilter(r)) yr25Map[r.model]=(yr25Map[r.model]||0)+1;
  });

  // LEV1
  var lv1='', sumTot=0, sumDebt=0, sumStock=0, sumBO=0, sumLXX=0;
  var totYr25=0;
  models.forEach(function(m){
    var tot=m.stock+m.bo+m.lxx;
    if(!tot&&!m.debt) return;
    sumTot+=tot; sumDebt+=m.debt; sumStock+=m.stock; sumBO+=m.bo; sumLXX+=m.lxx;
    var act=(selModel===m.name);
    var bonus=BONUS_MAP[m.name];
    var bonusBadge=bonus?'<span class="bonus">'+(bonus===1?'1tr':bonus===1.25?'1,25tr':'1,5tr')+'</span>':'';
    var yr25=(yr25Map[m.name]||0);

    lv1+='<div class="drill-row'+(act?' active':'')+'" onclick="clickModel(\''+esc(m.name)+'\')">'
      +'<div class="dr-name">'+m.name+bonusBadge+'</div>'
      +'<div class="dr-yr25">'+(yr25||'')+'</div>'
      +'<div class="dr-tot" style="color:var(--c-stock)">'+(m.stock||'<span style="color:#d1d5db">—</span>')+'</div>'
      +'<div class="dr-tot" style="color:var(--c-bo)">'+(m.bo||'<span style="color:#d1d5db">—</span>')+'</div>'
      +'<div class="dr-tot" style="color:var(--c-lxx)">'+(m.lxx||'<span style="color:#d1d5db">—</span>')+'</div>'
      +'<div class="dr-debt" style="color:var(--c-debt)">'+(m.debt||'<span style="color:#d1d5db">—</span>')+'</div>'

    +'<div class="dr-tot" style="color:var(--c-stock)">'+sumStock+'</div>'
    +'<div class="dr-tot" style="color:var(--c-bo)">'+sumBO+'</div>'
    +'<div class="dr-tot" style="color:var(--c-lxx)">'+sumLXX+'</div>'

    +'<span><span class="ldot" style="background:var(--c-stock);width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px"></span>Tồn kho</span>'
    +'<span><span class="ldot" style="background:var(--c-bo);width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px"></span>BO</span>'
    +'<span><span class="ldot" style="background:var(--c-lxx);width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px"></span>Có LXX</span>'
    +'<span style="color:var(--c-debt)">+N = xe nợ</span>'
    +'</div>';

    +'<div class="panel-hdr">Lev 1 – Model</div>'
    +'<div class="lev1-col-hdr"><span class="ch-name"></span><span class="ch-yr25">2025</span><span class="ch-col" style="color:var(--c-stock)">Tồn</span><span class="ch-col" style="color:var(--c-bo)">BO</span><span class="ch-col" style="color:var(--c-lxx)">LXX</span><span class="ch-debt">Nợ</span></div>'

function getLev3Title(models){
  var m=models.find(function(x){return x.name===selModel;});

  var lbl=v.name+(v.namSX&&parseInt(v.namSX)!==2026?' ('+v.namSX+')':'');
  return 'Lev 3 – Màu sắc · '+lbl;
}

    +'<span class="l2-cnt" style="color:var(--c-debt)">Nợ</span>'
    +'</div>';

    var tot=v.stock+v.bo+v.lxx;
    if(!tot&&!v.debt) return;
    var vKey=v.name+'||'+v.namSX;
    var act=(selVersion===vKey);
    var yrCls=parseInt(v.namSX)===2025?'yr25':parseInt(v.namSX)===2024?'yr24':parseInt(v.namSX)===2026?'yr26':'';
    var yrBadge=(v.namSX&&parseInt(v.namSX)!==2026)?'<span class="yr-badge '+yrCls+'">'+v.namSX+'</span>':'';
    html+='<div class="lev2-row'+(act?' active':'')+'" onclick="clickVersion(\''+esc(vKey)+'\')">'

      +'<span class="vc vc-s">'+(v.stock?v.stock:'<span class="vc-empty">—</span>')+'</span>'
      +'<span class="vc vc-b">'+(v.bo?v.bo:'<span class="vc-empty">—</span>')+'</span>'
      +'<span class="vc vc-l">'+(v.lxx?v.lxx:'<span class="vc-empty">—</span>')+'</span>'
      +'<span class="vc vc-d">'+(v.debt?v.debt:'<span class="vc-empty">—</span>')+'</span>'
      +'</div>';
  });
  return html||'<div class="empty-panel">Không có dữ liệu</div>';
}

function renderLev3Inner(models){
  var m=models.find(function(x){return x.name===selModel;});
  if(!m) return null;
  var v=m.versions.find(function(x){return (x.name+'||'+x.namSX)===selVersion;});
  if(!v) return null;

  function cell(colorObj, type, totalCls, chipCls){
    if(!colorObj[type]){
      return '<td><span style="color:#d1d5db">—</span></td>';
    }
    var parts=[];
    BRANCHES.forEach(function(k){
      var bk=colorObj.byKho[k];
      if(bk&&bk[type]) parts.push('<span class="kchip kchip-'+chipCls+'">'+k+' '+bk[type]+'</span>');
    });
    // Xe không xác định kho (TVBH trống, bán ngang...)
    var unknown=colorObj.byKho['?'];
    if(unknown&&unknown[type]) parts.push('<span class="kchip" style="background:#f3f4f6;color:#6b7280">? '+unknown[type]+'</span>');
    var chips=parts.length?'<div class="kho-chips">'+parts.join('')+'</div>':'';
    return '<td><div class="l3-cell">'
      +'<span class="l3-total l3-total-'+totalCls+'">'+colorObj[type]+'</span>'
      +chips
      +'</div></td>';
  }

  var html='<div class="lev3-inner"><table class="lev3-table" style="width:100%"><thead><tr>'
    +'<th style="white-space:nowrap;padding-right:8px;color:var(--muted)">Màu</th>'
    +'<th style="width:25%;text-align:center;color:var(--c-stock)">Tồn</th>'
    +'<th style="width:25%;text-align:center;color:var(--c-bo)">BO</th>'
    +'<th style="width:25%;text-align:center;color:var(--c-lxx)">LXX</th>'
    +'<th style="width:25%;text-align:center;color:var(--c-debt)">Nợ</th>'
    +'</tr></thead><tbody>';

  v.colors.forEach(function(c){
    if(!c.stock&&!c.bo&&!c.lxx&&!c.debt) return;
    html+='<tr>'
      +'<td style="vertical-align:middle"><span class="cdot" style="background:'+colorDot(c.name)+'"></span>'+c.name+'</td>'
      +cell(c,'stock','s','s')
      +cell(c,'bo','b','b')
      +cell(c,'lxx','l','l')
      +cell(c,'debt','d','d')
      +'</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

// ─── BUILD HIERARCHY ───
function buildHierarchy(){
  var mMap={};
  var src = typeFilter==='stock'
    ? allData.stock
    : allData.stock.concat(allData.bo,allData.lxx,allData.debt);
  src.forEach(function(r){
    if(!matchFilter(r)) return;
    var m=r.model;
    if(!mMap[m]) mMap[m]={name:m,stock:0,bo:0,lxx:0,debt:0,versions:{}};
    mMap[m][r.type]++;
    var vKey=r.phienBan+'||'+(r.namSX||'');
    if(!mMap[m].versions[vKey]) mMap[m].versions[vKey]={name:r.phienBan,namSX:r.namSX||'',stock:0,bo:0,lxx:0,debt:0,colors:{}};
    mMap[m].versions[vKey][r.type]++;
    var cKey=r.mau;
    if(!mMap[m].versions[vKey].colors[cKey]) mMap[m].versions[vKey].colors[cKey]={name:r.mau,stock:0,bo:0,lxx:0,debt:0,byKho:{}};
    mMap[m].versions[vKey].colors[cKey][r.type]++;
    var bk=r.kho||'?';
    if(!mMap[m].versions[vKey].colors[cKey].byKho[bk]) mMap[m].versions[vKey].colors[cKey].byKho[bk]={stock:0,bo:0,lxx:0,debt:0};
    mMap[m].versions[vKey].colors[cKey].byKho[bk][r.type]++;
  });
  var models=Object.values(mMap);
  models.sort(function(a,b){var ia=MODEL_ORDER.indexOf(a.name),ib=MODEL_ORDER.indexOf(b.name);if(ia<0)ia=999;if(ib<0)ib=999;return ia-ib;});
  models.forEach(function(m){
    m.versions=Object.values(m.versions).sort(function(a,b){var nc=a.name.localeCompare(b.name);return nc!==0?nc:String(b.namSX||'').localeCompare(String(a.namSX||''));});
    m.versions.forEach(function(v){v.colors=Object.values(v.colors).sort(function(a,b){return a.name.localeCompare(b.name);});});
  });
  return models;
}

function barHTML(stock,bo,lxx,maxV){
  if(!maxV) maxV=1;
  var total=stock+bo+lxx;
  if(!total) return '<div class="dr-bars" style="background:#f0f0f0;border-radius:2px"></div>';
  function seg(v,c){if(!v)return '';return '<div class="dr-seg" style="width:'+Math.max(Math.round(v/maxV*88),2)+'px;background:'+c+'"></div>';}
  return '<div class="dr-bars">'+seg(stock,'var(--c-stock)')+seg(bo,'var(--c-bo)')+seg(lxx,'var(--c-lxx)')+'</div>';
}

// ─── CLICK HANDLERS ───
function clickModel(name){
  if(selModel===name){
    selModel=null; selVersion=null;
  } else {
    selModel=name; selVersion=null;
  }
  renderAll();
  if(selModel){
    setTimeout(function(){
      var p2=document.getElementById('panel-lev2');
      if(p2) p2.scrollIntoView({behavior:'smooth',block:'start'});
    },60);
  }
}

function clickVersion(vKey){
  if(selVersion===vKey){
    selVersion=null;
  } else {
    selVersion=vKey;
  }
  renderAll();
  if(selVersion){
    setTimeout(function(){
      var p3=document.getElementById('panel-lev3');
      if(p3) p3.scrollIntoView({behavior:'smooth',block:'start'});
    },60);
  }
}

// ─── START ───
loadData();
</script>
